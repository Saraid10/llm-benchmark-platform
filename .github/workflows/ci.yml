name: CI — Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas numpy pydantic psutil rich python-dotenv pytest pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify seed data loads
        run: |
          python scripts/load_seed_data.py
          python -c "
          from src.db.repository import BenchmarkRepository
          repo = BenchmarkRepository()
          count = repo.count()
          print(f'DB has {count} records')
          assert count >= 25, f'Expected >= 25 records, got {count}'
          repo.close()
          print('✓ Seed data integrity check passed')
          "
